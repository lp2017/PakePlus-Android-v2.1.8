    let selectedBunType = bunTypes[0]; // 默认选择第一种包子类型

    // 初始化页面
    function initPage() {
      renderBunTypes();
      setupEventListeners();
    }

    // 渲染包子类型卡片
    function renderBunTypes() {
      bunTypesContainer.innerHTML = '';
      bunTypes.forEach(bunType => {
        const isSelected = selectedBunType.id === bunType.id;
        const card = document.createElement('div');
        card.className = `bg-white rounded-lg p-4 card-shadow cursor-pointer transform transition hover:scale-105 ${isSelected ? 'bg-primary/10 border-2 border-primary' : ''}`;
        card.innerHTML = `
          <div class="flex items-center">
            <div class="ml-3">
              <h3 class="font-bold text-lg">${bunType.name}</h3>
              <p class="text-sm text-gray-500">${bunType.category === 'meat' ? '肉类' : '素类'}</p>
            </div>
            ${isSelected ? '<i class="fa fa-check-circle text-primary ml-auto large-check-icon"></i>' : ''}
          </div>
        `;
        card.addEventListener('click', () => {
          selectedBunType = bunType;
          renderBunTypes();
        });
        bunTypesContainer.appendChild(card);
      });
    }
    
    // 设置基准配料
    function renderBaseIngredientOptions() {
      // 显示已选择的包子类型
      selectedBunTypeDisplay.textContent = selectedBunType.name;
      
      // 只使用第一个材料作为基准配料
      selectedBaseIngredient = selectedBunType.ingredients[0];
      
      // 显示基准配料名称
      selectedBaseIngredientDisplay.textContent = selectedBaseIngredient.name;
      
      // 更新重量输入框的值为选中配料的基础重量
      baseWeightInput.value = selectedBaseIngredient.amount;
      baseWeightSlider.value = selectedBaseIngredient.amount;
    }

    // 渲染参考表

    // 计算配料用量（基于基准配料重量）
    function calculateIngredients(bunType, baseIngredient, targetBaseWeight) {
      const baseRatio = targetBaseWeight / baseIngredient.amount;
      return bunType.ingredients.map(ingredient => ({
        name: ingredient.name,
        amount: ingredient.amount * baseRatio,
        isBase: ingredient.name === baseIngredient.name
      }));
    }

    // 显示计算结果
    function showResult() {
      const targetBaseWeight = parseInt(baseWeightInput.value);
      let ingredients = calculateIngredients(selectedBunType, selectedBaseIngredient, targetBaseWeight);
      
      // 将基准配料移到数组首位
      ingredients = ingredients.sort((a, b) => {
        if (a.isBase) return -1;
        if (b.isBase) return 1;
        return 0;
      });
      
      // 更新结果页面信息 - 简化显示
      resultBunType.textContent = `${selectedBunType.name}`;
      
      // 清空并填充结果表格
      resultTableBody.innerHTML = '';
      ingredients.forEach(ingredient => {
        const row = document.createElement('tr');
        const isBaseIngredient = ingredient.isBase;
        const isEvenRow = ingredients.indexOf(ingredient) % 2 === 0;
        row.className = `border-b-2 border-gray-200 hover:bg-primary/10 ${isBaseIngredient ? 'base-ingredient-highlight bg-primary/10' : (isEvenRow ? 'bg-gray-100 editing-breathing-bg' : 'bg-white')}`;
        
        // 添加提示图标和文字
        const highlightIcon = isBaseIngredient ? 
          '<i class="fa fa-star text-primary mr-2" title="基准配料"></i>' : '';
        const highlightText = isBaseIngredient ? 
          `<span class="text-sm bg-primary text-white px-2 py-1 rounded ml-2">基准</span>` : '';
        
        row.innerHTML = `
          <td class="py-3 px-4 text-center text-base font-medium">
            ${highlightIcon}${ingredient.name}${highlightText}
          </td>
          <td class="py-3 px-4 text-center text-base font-bold">${Math.round(ingredient.amount)}</td>
        `;
        resultTableBody.appendChild(row);
      });
      
      // 切换到结果页面
      switchPage(pageResult);
    }

    // 页面切换函数
    function switchPage(targetPage) {
      // 隐藏所有页面
      document.querySelectorAll('.page-content').forEach(page => {
        page.classList.add('hidden');
      });
      
      // 显示目标页面并添加动画
      targetPage.classList.remove('hidden');
      targetPage.classList.add('page-enter');
      setTimeout(() => {
        targetPage.classList.add('page-enter-active');
      }, 10);
      setTimeout(() => {
        targetPage.classList.remove('page-enter', 'page-enter-active');
      }, 300);
      
      // 更新导航按钮状态
      if (targetPage === pageHome) {
        navHome.classList.add('bg-white', 'bg-opacity-20');
        navReference.classList.remove('bg-white', 'bg-opacity-20');
      } else if (targetPage === pageReference) {
        navHome.classList.remove('bg-white', 'bg-opacity-20');
        navReference.classList.add('bg-white', 'bg-opacity-20');
      }
    }

    // 显示提示信息
    function showToast(message, duration = 2000) {
      toastMessage.textContent = message;
      toast.classList.remove('hidden');
      setTimeout(() => {
        toast.classList.add('hidden');
      }, duration);
    }

    // 保存结果为图片
    function saveResultAsImage() {
      const name = saveNameInput.value.trim() || `${selectedBunType.name}包子配比`;
      
      // 获取当前日期时间
      const now = new Date();
      const dateTimeStr = now.toLocaleString('zh-CN', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
      
      // 格式化文件名，使用"xxxx年mm月dd日 x时x分 名称配比_序号.jpg"格式
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const fileName = `${year}年${month}月${day}日 ${hours}时${minutes}分${selectedBunType.name}配比_01`;
      
      // 创建一个包含结果和日期时间的临时容器 - 修复宽度兼容性
      const resultContainer = document.createElement('div');
      resultContainer.className = 'bg-white p-4 rounded-lg shadow-lg w-full max-w-md mx-auto';
      resultContainer.style.position = 'absolute';
      resultContainer.style.left = '-9999px';
      resultContainer.style.textAlign = 'center'; // 确保整体居中
      resultContainer.style.width = '400px'; // 增大宽度确保完整显示
      resultContainer.style.minWidth = '400px';
      document.body.appendChild(resultContainer);
      
      // 添加日期时间戳 - 荣耀30Pro适配
      const dateTimeElement = document.createElement('div');
      dateTimeElement.className = 'text-center text-lg font-bold text-black mb-3';
      dateTimeElement.textContent = `制作日期: ${dateTimeStr}`;
      resultContainer.appendChild(dateTimeElement);
      
      // 复制结果内容并确保样式正确
      const resultContent = document.querySelector('#page-result .bg-white').cloneNode(true);
      // 移除原有的标题和类型信息
      const originalTitle = resultContent.querySelector('h2');
      if (originalTitle) originalTitle.remove();
      const originalTypeInfo = resultContent.querySelector('#bun-type-info');
      if (originalTypeInfo) originalTypeInfo.remove();
      
      // 确保表格内容正确对齐
      const table = resultContent.querySelector('table');
      if (table) {
        table.style.width = '100%';
        table.style.borderCollapse = 'collapse';
        
        // 确保表头和表格内容正确对齐 - 居中布局
        const thElements = table.querySelectorAll('th');
        thElements.forEach((th, index) => {
          th.style.textAlign = 'center';
          th.style.padding = '12px 8px';
          th.style.fontSize = '16px';
          th.style.width = index === 0 ? '67%' : '33%'; // 2:1比例
        });
        
        const tdElements = table.querySelectorAll('td');
        tdElements.forEach((td, index) => {
          td.style.textAlign = 'center';
          td.style.padding = '12px 8px';
          td.style.fontSize = '16px';
          td.style.width = index % 2 === 0 ? '67%' : '33%'; // 2:1比例
        });
      }
      
      resultContainer.appendChild(resultContent);
      
      // 使用html2canvas将结果转换为图片
      html2canvas(resultContainer).then(canvas => {
        // 创建下载链接
        const link = document.createElement('a');
        link.download = `${fileName}.png`;
        link.href = canvas.toDataURL();
        link.click();
        
        // 清理临时元素
        document.body.removeChild(resultContainer);
        
        showToast('结果已保存为图片');
        saveModal.classList.add('hidden');
      }).catch(error => {
        console.error('保存图片失败:', error);
        showToast('保存图片失败，请重试');
        document.body.removeChild(resultContainer);
      });
    }

    // 设置事件监听器
    function setupEventListeners() {
      // 基准重量输入和滑块同步
      baseWeightInput.addEventListener('input', () => {
        baseWeightSlider.value = baseWeightInput.value;
      });
      
      baseWeightSlider.addEventListener('input', () => {
        baseWeightInput.value = baseWeightSlider.value;
      });
      
      // 计算按钮点击事件
      calculateBtn.addEventListener('click', showResult);
      
      // 页面导航事件
      nextToWeightBtn.addEventListener('click', () => {
        renderBaseIngredientOptions();
        switchPage(pageWeight);
      });
      
      backToBunTypeBtn.addEventListener('click', () => {
        switchPage(pageHome);
      });
      
      // 主导航按钮点击事件
      navHome.addEventListener('click', () => switchPage(pageHome));
      recalculateBtn.addEventListener('click', () => switchPage(pageHome));
      
      // 保存结果相关事件
      saveResultBtn.addEventListener('click', () => {
        saveNameInput.value = `${selectedBunType.name}包子配比_${selectedBaseIngredient.name}${baseWeightInput.value}g`;
        saveModal.classList.remove('hidden');
      });
      
      cancelSaveBtn.addEventListener('click', () => {
        saveModal.classList.add('hidden');
      });
      
      confirmSaveBtn.addEventListener('click', saveResultAsImage);
      
      // 点击模态框外部关闭
      saveModal.addEventListener('click', (e) => {
        if (e.target === saveModal) {
          saveModal.classList.add('hidden');
        }
      });
    }

    // 初始化页面
    document.addEventListener('DOMContentLoaded', initPage);
  </script>

</body></html>
